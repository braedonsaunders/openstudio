name: Build Native Bridge

on:
  push:
    paths:
      - 'native-bridge/**'
      - '.github/workflows/native-bridge.yml'
    branches:
      - main
  pull_request:
    paths:
      - 'native-bridge/**'
  workflow_dispatch: # Allow manual trigger

env:
  CARGO_TERM_COLOR: always
  R2_BUCKET: openstudio-releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 with ASIO
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: openstudio-bridge-windows.exe
            binary: openstudio-bridge.exe
            features: asio

          # macOS x64 (Intel)
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: openstudio-bridge-macos-x64
            binary: openstudio-bridge
            features: default

          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: openstudio-bridge-macos-arm64
            binary: openstudio-bridge
            features: default

          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: openstudio-bridge-linux
            binary: openstudio-bridge
            features: default

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev

      - name: Check ASIO SDK exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asioPath = "native-bridge/asio-sdk/common/asio.h"
          if (Test-Path $asioPath) {
            Write-Host "✓ ASIO SDK found - building with ASIO support"
            echo "CPAL_ASIO_DIR=${{ github.workspace }}/native-bridge/asio-sdk" >> $env:GITHUB_ENV
          } else {
            Write-Host "⚠ ASIO SDK not found at $asioPath"
            Write-Host "  Building without ASIO (WASAPI only)"
            echo "BUILD_FEATURES=default" >> $env:GITHUB_ENV
          }

      - name: Build (Windows with ASIO)
        if: runner.os == 'Windows' && env.BUILD_FEATURES != 'default'
        working-directory: native-bridge
        shell: pwsh
        run: |
          cargo build --release --target ${{ matrix.target }} --features asio

      - name: Build (Windows without ASIO)
        if: runner.os == 'Windows' && env.BUILD_FEATURES == 'default'
        working-directory: native-bridge
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        working-directory: native-bridge
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp native-bridge/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "native-bridge/target/${{ matrix.target }}/release/${{ matrix.binary }}" -Destination "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 90

  # Upload to Cloudflare R2 when pushing to main
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        working-directory: native-bridge
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -la release/

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Upload each file to R2
          for file in release/*; do
            filename=$(basename "$file")
            echo "Uploading $filename..."

            # Upload to versioned path
            wrangler r2 object put "${{ env.R2_BUCKET }}/v${VERSION}/${filename}" --file="$file"

            # Also upload to "latest" for easy access
            wrangler r2 object put "${{ env.R2_BUCKET }}/latest/${filename}" --file="$file"
          done

          # Create version manifest
          echo "{\"version\": \"${VERSION}\", \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > version.json
          wrangler r2 object put "${{ env.R2_BUCKET }}/latest/version.json" --file="version.json"

          echo "✓ Uploaded to R2 bucket: ${{ env.R2_BUCKET }}"
          echo "  - /v${VERSION}/"
          echo "  - /latest/"
